<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CMS - New Article Editor</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0d9488", // Teal 600
                        "background-light": "#f7f9f9",
                        "background-dark": "#0f1717",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<div class="layout-container flex h-full grow flex-col">
<!-- Top Navigation Bar -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-primary/10 bg-white dark:bg-background-dark px-6 py-3 lg:px-10">
<div class="flex items-center gap-4 text-primary">
<div class="size-8 flex items-center justify-center bg-primary rounded-lg text-white">
<span class="material-symbols-outlined">auto_stories</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight">CMS Studio</h2>
</div>
<div class="flex flex-1 justify-end gap-4 lg:gap-8">
<nav class="hidden md:flex items-center gap-6">
<a class="text-slate-600 dark:text-slate-400 hover:text-primary dark:hover:text-primary text-sm font-medium" href="#">Dashboard</a>
<a class="text-primary text-sm font-semibold underline underline-offset-4" href="#">Projects</a>
<a class="text-slate-600 dark:text-slate-400 hover:text-primary dark:hover:text-primary text-sm font-medium" href="#">Media</a>
<a class="text-slate-600 dark:text-slate-400 hover:text-primary dark:hover:text-primary text-sm font-medium" href="#">Settings</a>
</nav>
<div class="flex gap-2">
<button class="flex min-w-[84px] cursor-pointer items-center justify-center rounded-lg h-10 px-4 bg-primary text-white text-sm font-bold shadow-sm hover:bg-primary/90 transition-colors">
                        Publish
                    </button>
<button class="flex items-center justify-center rounded-lg h-10 w-10 bg-primary/10 text-primary hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined">notifications</span>
</button>
<button class="flex items-center justify-center rounded-lg h-10 w-10 bg-primary/10 text-primary hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined">account_circle</span>
</button>
</div>
</div>
</header>
<!-- Main Content Wrapper -->
<main class="flex-1 overflow-y-auto">
<div class="mx-auto max-w-[1440px] px-6 py-8 lg:px-10">
<!-- Breadcrumbs & Header -->
<div class="mb-6">
<div class="flex items-center gap-2 text-primary/70 text-sm mb-2 font-medium">
<a class="hover:text-primary" href="#">Projects</a>
<span class="material-symbols-outlined text-xs">chevron_right</span>
<span class="text-slate-900 dark:text-slate-100">Create New Article</span>
</div>
<div class="flex flex-wrap items-center justify-between gap-4">
<h1 class="text-3xl font-black tracking-tight text-slate-900 dark:text-slate-100">Untitled Article</h1>
<div class="flex gap-3">
<button class="px-4 py-2 border border-primary/20 rounded-lg text-primary text-sm font-bold hover:bg-primary/5 transition-colors flex items-center gap-2">
<span class="material-symbols-outlined text-sm">visibility</span> Preview
                            </button>
<button class="px-4 py-2 bg-primary/10 border border-primary/10 rounded-lg text-primary text-sm font-bold hover:bg-primary/20 transition-colors">
                                Save Draft
                            </button>
</div>
</div>
</div>
<!-- Two-Column Layout -->
<div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
<!-- Main Content Area (8 Cols) -->
<div class="lg:col-span-8 space-y-6">
<!-- Title Field -->
<div class="bg-white dark:bg-slate-900/50 p-6 rounded-xl border border-primary/10 shadow-sm">
<label class="block mb-2 text-sm font-semibold text-slate-700 dark:text-slate-300">Article Title</label>
<input class="w-full text-2xl font-bold bg-transparent border-none focus:ring-0 p-0 placeholder:text-slate-300 dark:placeholder:text-slate-700 text-slate-900 dark:text-slate-100" placeholder="Enter a catchy title..." type="text"/>
</div>
<!-- Rich Text Editor Container -->
<div class="bg-white dark:bg-slate-900/50 rounded-xl border border-primary/10 shadow-sm overflow-hidden flex flex-col min-h-[500px]">
<!-- Toolbar -->
<div class="flex flex-wrap items-center gap-1 p-2 border-b border-primary/10 bg-slate-50 dark:bg-slate-900">
<button class="p-2 hover:bg-primary/10 rounded text-slate-600 dark:text-slate-400"><span class="material-symbols-outlined">format_bold</span></button>
<button class="p-2 hover:bg-primary/10 rounded text-slate-600 dark:text-slate-400"><span class="material-symbols-outlined">format_italic</span></button>
<button class="p-2 hover:bg-primary/10 rounded text-slate-600 dark:text-slate-400"><span class="material-symbols-outlined">format_underlined</span></button>
<div class="w-px h-6 bg-primary/10 mx-1"></div>
<button class="p-2 hover:bg-primary/10 rounded text-slate-600 dark:text-slate-400"><span class="material-symbols-outlined">format_list_bulleted</span></button>
<button class="p-2 hover:bg-primary/10 rounded text-slate-600 dark:text-slate-400"><span class="material-symbols-outlined">format_list_numbered</span></button>
<div class="w-px h-6 bg-primary/10 mx-1"></div>
<button class="p-2 hover:bg-primary/10 rounded text-slate-600 dark:text-slate-400"><span class="material-symbols-outlined">link</span></button>
<button class="p-2 hover:bg-primary/10 rounded text-slate-600 dark:text-slate-400"><span class="material-symbols-outlined">image</span></button>
<button class="p-2 hover:bg-primary/10 rounded text-slate-600 dark:text-slate-400"><span class="material-symbols-outlined">code</span></button>
<button class="p-2 hover:bg-primary/10 rounded text-slate-600 dark:text-slate-400"><span class="material-symbols-outlined">format_quote</span></button>
<div class="ml-auto flex items-center gap-4 pr-2">
<span class="text-xs text-slate-400">Words: 0</span>
</div>
</div>
<!-- Text Area -->
<textarea class="flex-1 w-full p-8 bg-transparent border-none focus:ring-0 text-slate-800 dark:text-slate-200 resize-none min-h-[400px] leading-relaxed" placeholder="Start writing your masterpiece..."></textarea>
</div>
</div>
<!-- Sidebar Settings (4 Cols) -->
<aside class="lg:col-span-4 space-y-6">
<!-- Publishing Status Card -->
<div class="bg-white dark:bg-slate-900/50 p-6 rounded-xl border border-primary/10 shadow-sm">
<h3 class="text-sm font-bold uppercase tracking-wider text-slate-500 mb-4">Publishing</h3>
<div class="space-y-4">
<div>
<label class="block text-xs font-semibold text-slate-400 mb-1">Status</label>
<select class="w-full bg-background-light dark:bg-background-dark border-primary/10 rounded-lg text-sm focus:ring-primary focus:border-primary">
<option>Draft</option>
<option>In Review</option>
<option>Scheduled</option>
<option>Published</option>
</select>
</div>
<div>
<label class="block text-xs font-semibold text-slate-400 mb-1">Schedule Publish</label>
<div class="relative">
<input class="w-full bg-background-light dark:bg-background-dark border-primary/10 rounded-lg text-sm focus:ring-primary focus:border-primary" type="datetime-local"/>
</div>
</div>
<button class="w-full py-2 bg-primary text-white rounded-lg text-sm font-bold shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all">
                                    Set Visibility
                                </button>
</div>
</div>
<!-- Featured Image Card -->
<div class="bg-white dark:bg-slate-900/50 p-6 rounded-xl border border-primary/10 shadow-sm">
<h3 class="text-sm font-bold uppercase tracking-wider text-slate-500 mb-4">Featured Image</h3>
<div class="group relative aspect-video w-full overflow-hidden rounded-lg bg-slate-100 dark:bg-background-dark border-2 border-dashed border-primary/20 flex flex-col items-center justify-center cursor-pointer hover:border-primary transition-colors">
<div class="text-center p-4">
<span class="material-symbols-outlined text-4xl text-primary/40 group-hover:text-primary mb-2">add_photo_alternate</span>
<p class="text-xs text-slate-500">Click to upload or drag image</p>
</div>
<div class="hidden absolute inset-0 bg-cover bg-center" data-alt="Abstract vibrant geometric article thumbnail" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBmyzhc9-mWPZ9VZofAlfCKJNNypadvytohHEZAesSGpA6Bb6tWwN-y-GKsiWrUI6dr196VgZblE1TUGlHJnpLCqo_Y4FupVXDZeFIsYYLF6Ga1y1JaZLa6LJDInWbCNMlA-HJPcG42wmqXwwsv11dhGrb2chyBKAattI1Lff_WwSNCIXVrXbtkYvbg0FaBlB7nWDZ-tXkwoC5aTxIn4fAB0ZmJp793NbAR_uO7zB5C3J0O08smRwWonkYvoryYIi53jCre0FFpS2w');"></div>
</div>
</div>
<!-- Organization Card -->
<div class="bg-white dark:bg-slate-900/50 p-6 rounded-xl border border-primary/10 shadow-sm">
<h3 class="text-sm font-bold uppercase tracking-wider text-slate-500 mb-4">Organization</h3>
<div class="space-y-4">
<div>
<label class="block text-xs font-semibold text-slate-400 mb-1">Category</label>
<select class="w-full bg-background-light dark:bg-background-dark border-primary/10 rounded-lg text-sm focus:ring-primary focus:border-primary">
<option>Select Category</option>
<option>Technology</option>
<option>Design</option>
<option>Marketing</option>
<option>Lifestyle</option>
</select>
</div>
<div>
<label class="block text-xs font-semibold text-slate-400 mb-1">Tags</label>
<div class="flex flex-wrap gap-2 mb-2">
<span class="inline-flex items-center gap-1 px-2 py-1 bg-primary/10 text-primary rounded text-xs font-medium">
                                            UI Design <button class="material-symbols-outlined text-xs">close</button>
</span>
<span class="inline-flex items-center gap-1 px-2 py-1 bg-primary/10 text-primary rounded text-xs font-medium">
                                            CMS <button class="material-symbols-outlined text-xs">close</button>
</span>
</div>
<input class="w-full bg-background-light dark:bg-background-dark border-primary/10 rounded-lg text-sm focus:ring-primary focus:border-primary" placeholder="Add tag..." type="text"/>
</div>
</div>
</div>
<!-- SEO Metadata Card -->
<div class="bg-white dark:bg-slate-900/50 p-6 rounded-xl border border-primary/10 shadow-sm">
<div class="flex items-center justify-between mb-4">
<h3 class="text-sm font-bold uppercase tracking-wider text-slate-500">SEO Settings</h3>
<span class="material-symbols-outlined text-slate-400 text-sm">info</span>
</div>
<div class="space-y-4">
<div>
<label class="block text-xs font-semibold text-slate-400 mb-1">Meta Description</label>
<textarea class="w-full bg-background-light dark:bg-background-dark border-primary/10 rounded-lg text-sm focus:ring-primary focus:border-primary resize-none" placeholder="Brief summary for search engines..." rows="3"></textarea>
</div>
<div class="flex items-center gap-2">
<input class="rounded text-primary focus:ring-primary border-primary/20" id="noindex" type="checkbox"/>
<label class="text-xs font-medium text-slate-600 dark:text-slate-400" for="noindex">Hide from search engines</label>
</div>
</div>
</div>
<!-- Danger Zone -->
<div class="pt-4 border-t border-primary/5">
<button class="flex items-center gap-2 text-red-500 hover:text-red-600 text-sm font-semibold transition-colors">
<span class="material-symbols-outlined text-lg">delete</span>
                                Move to Trash
                            </button>
</div>
</aside>
</div>
</div>
</main>
</div>
</body></html>
